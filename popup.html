<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 250px;
      padding: 15px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f4f7f9;
      margin: 0;
    }
    .container {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    h2 {
      margin: 0 0 10px 0;
      font-size: 18px;
      color: #1e3448;
      border-bottom: 2px solid #1abc9c;
      padding-bottom: 5px;
    }
    button {
      padding: 10px;
      background-color: #1abc9c;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      transition: background 0.3s;
    }
    button:hover {
      background-color: #16a085;
    }
    .info {
      font-size: 11px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>BAS Filler</h2>
    <button id="fillBtn">Auto-Fill Form</button>
    <div class="info">Ready to fill Endri Susanto's profile.</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
